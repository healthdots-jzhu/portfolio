name: Build and push Docker images (APIs) to ECR and other backend tasks

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging, beta, prod)'
        required: false
        default: 'beta'

permissions:
  contents: read
  actions: read
  id-token: write

env:
  AWS_REGION: ca-central-1
  ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'beta' }}

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'beta' }}
    env:
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
      IMAGE_REPOSITORY: ${{ format('{0}-healthdots-portfolio-api', github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'beta') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.CI_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Wait for infra workflow to finish (if running)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_WORKFLOW_PATH: .github/workflows/1-deploy-infra.yml
        run: |
          set -euo pipefail
          command -v jq >/dev/null || (sudo apt-get update -y && sudo apt-get install -y jq)
          WORKFLOWS_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows"
          WORKFLOW_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$WORKFLOWS_API" | jq -r --arg p "$TARGET_WORKFLOW_PATH" '.workflows[] | select(.path==$p) | .id')
          if [ -z "$WORKFLOW_ID" ] || [ "$WORKFLOW_ID" = "null" ]; then
            echo "Target workflow not found: $TARGET_WORKFLOW_PATH - continuing"
          else
            echo "Waiting for workflow id $WORKFLOW_ID ($TARGET_WORKFLOW_PATH) to have no in-progress runs"
            MAX_WAIT=1800
            INTERVAL=15
            waited=0
            while true; do
              runs=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_ID}/runs?status=in_progress")
              count=$(echo "$runs" | jq '.total_count')
              if [ "$count" -eq 0 ]; then
                echo "No in-progress runs for ${TARGET_WORKFLOW_PATH}"
                break
              fi
              echo "Found $count in-progress run(s); waiting ${INTERVAL}s..."
              sleep $INTERVAL
              waited=$((waited+INTERVAL))
              if [ $waited -ge $MAX_WAIT ]; then
                echo "Timed out waiting for ${TARGET_WORKFLOW_PATH} to finish after ${waited}s"
                exit 1
              fi
            done
          fi

      - name: Login to ECR
        id: ecr-login
        run: |
          # Derive registry if not provided via repo variable
          if [ -z "${ECR_REGISTRY:-}" ]; then
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            echo "Derived ECR_REGISTRY=${ECR_REGISTRY}"
          fi
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: ECR debug & ensure repo
        run: |
          echo "Caller identity:"; aws sts get-caller-identity
          echo "Checking repository ${IMAGE_REPOSITORY}";
          aws ecr describe-repositories --repository-names "${IMAGE_REPOSITORY}" || \
            aws ecr create-repository --repository-name "${IMAGE_REPOSITORY}" --image-scanning-configuration scanOnPush=true
          aws ecr describe-repositories --repository-names "${IMAGE_REPOSITORY}"
        env:
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: ./APIs/Portfolio.Api
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: Set job output image
        id: set-image
        run: |
          echo "image=${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
