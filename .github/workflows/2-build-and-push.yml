name: Build and push Docker images (APIs) to ECR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging, beta, prod)'
        required: false
        default: 'beta'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ca-central-1
  ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'beta' }}

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'beta' }}
    env:
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.CI_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: ecr-login
        run: |
          aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
        env:
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: ./APIs/Portfolio.Api
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}:latest
            ${{ env.ECR_REGISTRY }}:${{ github.sha }}

      - name: Set job output image
        id: set-image
        run: |
          echo "image=${{ env.ECR_REGISTRY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
