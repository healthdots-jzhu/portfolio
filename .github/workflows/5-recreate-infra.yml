name: '[On-Demand] Re-create Infrastructure (Reuse Existing RDS)'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to re-create'
        required: true
        default: 'beta'
        type: choice
        options:
          - staging
          - beta
          - prod
      postgres_connection_string:
        description: 'Postgres connection string (required — used to verify/update the Secrets Manager secret)'
        required: false
        default: ''
      github_models_api_token:
        description: 'GitHub Models API token (required — used to verify/update the Secrets Manager secret)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ca-central-1
  ENVIRONMENT: ${{ github.event.inputs.environment }}

jobs:
  recreate:
    name: Terraform apply (reuses existing RDS, VPC, subnets, ECR, KMS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.CI_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Verify Secrets Manager secrets exist
        shell: bash
        run: |
          set -euo pipefail

          SECRET_POSTGRES_NAME="${{ vars.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-postgres-connection"
          SECRET_GITHUB_NAME="${{ vars.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-github-models-token"

          check_secret_has_version() {
            COUNT=$(aws secretsmanager list-secret-version-ids --secret-id "$1" --query 'length(Versions)' --output text 2>/dev/null || echo 0)
            [ "$COUNT" -gt 0 ]
          }

          put_secret_value() {
            aws secretsmanager put-secret-value --secret-id "$1" --secret-string "$2"
          }

          # If optional inputs were provided, validate and update secrets
          POSTGRES_INPUT="${{ github.event.inputs.postgres_connection_string }}"
          GITHUB_INPUT="${{ github.event.inputs.github_models_api_token }}"

          if [ -n "$POSTGRES_INPUT" ]; then
            if [ ${#POSTGRES_INPUT} -lt 20 ]; then
              echo "ERROR: Postgres connection string is too short."
              exit 1
            fi
            for kw in "Host=" "Port=" "Database=" "Username=" "Password="; do
              if ! echo "$POSTGRES_INPUT" | grep -q "$kw"; then
                echo "ERROR: Postgres connection string missing required token: $kw"
                exit 1
              fi
            done
            put_secret_value "$SECRET_POSTGRES_NAME" "$POSTGRES_INPUT"
            echo "Updated secret: $SECRET_POSTGRES_NAME"
          fi

          if [ -n "$GITHUB_INPUT" ]; then
            if [ ${#GITHUB_INPUT} -lt 20 ]; then
              echo "ERROR: GitHub Models API token is too short."
              exit 1
            fi
            if ! echo "$GITHUB_INPUT" | grep -Eq "ghp_|github_pat_|github_"; then
              echo "ERROR: GitHub Models API token missing expected prefix (ghp_, github_pat_, or github_)"
              exit 1
            fi
            put_secret_value "$SECRET_GITHUB_NAME" "$GITHUB_INPUT"
            echo "Updated secret: $SECRET_GITHUB_NAME"
          fi

          # Verify both secrets have a value
          MISSING=false
          if ! check_secret_has_version "$SECRET_POSTGRES_NAME"; then
            echo "ERROR: Secret '$SECRET_POSTGRES_NAME' is missing or has no value. Provide 'postgres_connection_string' input to set it."
            MISSING=true
          fi
          if ! check_secret_has_version "$SECRET_GITHUB_NAME"; then
            echo "ERROR: Secret '$SECRET_GITHUB_NAME' is missing or has no value. Provide 'github_models_api_token' input to set it."
            MISSING=true
          fi
          if [ "$MISSING" = "true" ]; then
            exit 1
          fi
          echo "All required Secrets Manager secrets are present."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.14.3"

      - name: Export GitHub variables to TF_VAR_*
        shell: bash
        run: |
          echo "TF_VAR_environment=${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "TF_VAR_aws_region=${{ vars.AWS_REGION }}" >> $GITHUB_ENV
          echo "TF_VAR_s3_bucket_frontend=${{ vars.S3_BUCKET_FRONTEND }}" >> $GITHUB_ENV
          echo "TF_VAR_project_name=${{ vars.PROJECT_NAME }}" >> $GITHUB_ENV
          echo "TF_VAR_vpc_cidr=${{ vars.VPC_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_public_subnet_cidr=${{ vars.PUBLIC_SUBNET_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_public_2b_cidr=${{ vars.PUBLIC_2B_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_private_subnet_cidr=${{ vars.PRIVATE_SUBNET_CIDR }}" >> $GITHUB_ENV
          if [ -n "${{ vars.RDS_SSM_EC2_INSTANCE_TYPE }}" ]; then
            echo "TF_VAR_rds_ssm_ec2_instance_type=${{ vars.RDS_SSM_EC2_INSTANCE_TYPE }}" >> $GITHUB_ENV
          fi
          echo "TF_VAR_rds_instance_class=${{ vars.RDS_INSTANCE_CLASS }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_allocated_storage=${{ vars.RDS_ALLOCATED_STORAGE }}" >> $GITHUB_ENV
          echo "TF_VAR_postgres_version=${{ vars.POSTGRES_VERSION }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_database_name=${{ vars.RDS_DATABASE_NAME }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_username=${{ vars.RDS_USERNAME }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_storage_type=${{ vars.RDS_STORAGE_TYPE }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_skip_final_snapshot=${{ vars.RDS_SKIP_FINAL_SNAPSHOT }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_backup_retention_period=${{ vars.RDS_BACKUP_RETENTION_PERIOD }}" >> $GITHUB_ENV
          echo "TF_VAR_rds_multi_az=${{ vars.RDS_MULTI_AZ }}" >> $GITHUB_ENV
          echo "TF_VAR_ecs_task_cpu=${{ vars.ECS_TASK_CPU }}" >> $GITHUB_ENV
          echo "TF_VAR_ecs_task_memory=${{ vars.ECS_TASK_MEMORY }}" >> $GITHUB_ENV
          if [[ -z "${TF_VAR_ecs_service_desired_count:-}" ]]; then
            echo "TF_VAR_ecs_service_desired_count=1" >> $GITHUB_ENV
          else
            echo "TF_VAR_ecs_service_desired_count=${{ vars.ECS_SERVICE_DESIRED_COUNT }}" >> $GITHUB_ENV
          fi
          echo "TF_VAR_acm_certificate_arn=${{ vars.ACM_CERTIFICATE_ARN }}" >> $GITHUB_ENV
          echo "TF_VAR_tf_state_key=${{ vars.TF_STATE_KEY }}" >> $GITHUB_ENV
          echo "TF_VAR_tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" >> $GITHUB_ENV
          echo "TF_VAR_tf_state_dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}" >> $GITHUB_ENV
          echo "TF_VAR_private_2a_cidr=${{ vars.PRIVATE_2A_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_private_2b_cidr=${{ vars.PRIVATE_2B_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_private_app_2a_cidr=${{ vars.PRIVATE_APP_2A_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_private_app_2b_cidr=${{ vars.PRIVATE_APP_2B_CIDR }}" >> $GITHUB_ENV
          echo "TF_VAR_path_base=${{ vars.PATH_BASE }}" >> $GITHUB_ENV
          echo "TF_VAR_api_subdomain=${{ vars.API_SUBDOMAIN }}" >> $GITHUB_ENV
          echo "TF_VAR_route53_zone_name=${{ vars.ROUTE53_ZONE_NAME }}" >> $GITHUB_ENV
          if [ -n "${{ vars.ACM_CERTIFICATE_ARNS }}" ]; then
            echo 'TF_VAR_acm_certificate_arns=${{ vars.ACM_CERTIFICATE_ARNS }}' >> $GITHUB_ENV
          else
            echo "TF_VAR_acm_certificate_arns=[]" >> $GITHUB_ENV
          fi
          if [ -n "${{ vars.API_CERTIFICATE_ARN_INDEX }}" ]; then
            echo "TF_VAR_api_certificate_arn_index=${{ vars.API_CERTIFICATE_ARN_INDEX }}" >> $GITHUB_ENV
          else
            echo "TF_VAR_api_certificate_arn_index=0" >> $GITHUB_ENV
          fi

      - name: Terraform init (S3 backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Verify pre-destroy state snapshot exists in S3
        shell: bash
        run: |
          set -euo pipefail
          LATEST_KEY="terraform-preserved/${{ env.ENVIRONMENT }}/pre_destroy_latest.tfstate"
          if ! aws s3 ls "s3://${{ vars.TF_STATE_BUCKET }}/${LATEST_KEY}" --region "${{ vars.AWS_REGION }}" > /dev/null 2>&1; then
            echo "ERROR: No pre-destroy state snapshot found at:"
            echo "  s3://${{ vars.TF_STATE_BUCKET }}/${LATEST_KEY}"
            echo ""
            echo "You must run '4-destroy-infra-keep-rds.yml' before running this workflow."
            echo "If the infrastructure was never destroyed via that workflow, run '1-deploy-infra.yml' instead."
            exit 1
          fi
          echo "Pre-destroy state snapshot found at s3://${{ vars.TF_STATE_BUCKET }}/${LATEST_KEY}"

      - name: Restore pre-destroy state snapshot
        shell: bash
        run: |
          set -euo pipefail
          LATEST_KEY="terraform-preserved/${{ env.ENVIRONMENT }}/pre_destroy_latest.tfstate"

          # Download the pre-destroy snapshot
          aws s3 cp "s3://${{ vars.TF_STATE_BUCKET }}/${LATEST_KEY}" ../pre_destroy.tfstate --region "${{ vars.AWS_REGION }}"

          STATE_SIZE=$(wc -c < ../pre_destroy.tfstate)
          echo "Downloaded state snapshot: $STATE_SIZE bytes"
          if [ "$STATE_SIZE" -lt 100 ]; then
            echo "ERROR: Downloaded state snapshot is suspiciously small. Aborting."
            exit 1
          fi

          # Push the pre-destroy state back — -force is required because its serial
          # is lower than the post-destroy state that currently lives in the backend.
          terraform state push -force ../pre_destroy.tfstate
          echo "Pre-destroy state snapshot restored to backend."

      - name: Terraform plan (verify what will be re-created)
        shell: bash
        run: |
          terraform plan -out=recreate.tfplan

      - name: Upload TF plan to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp recreate.tfplan "s3://${{ vars.TF_STATE_BUCKET }}/terraform-plans/${{ env.ENVIRONMENT }}/recreate-plan-${{ github.run_id }}.tfplan" --region "${{ env.AWS_REGION }}"

      - name: Terraform apply (re-creates destroyed resources, preserves existing ones)
        run: |
          terraform apply -auto-approve recreate.tfplan

      - name: Recreate summary
        if: always()
        shell: bash
        run: |
          echo "================================"
          echo "Re-create workflow complete."
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo ""
          echo "Resources that were REUSED (already existed in AWS, adopted by state):"
          echo "  - VPC, Internet Gateway, all Subnets, Route Tables"
          echo "  - Security Groups: ec2, rds, vpc_endpoints"
          echo "  - EC2 SSM IAM Role + Instance Profile"
          echo "  - RDS instance: aws_db_instance.postgres-portfolio"
          echo "  - KMS key + alias for RDS"
          echo "  - SSM Parameter: hashids_salt"
          echo "  - ECR repository + lifecycle policy"
          echo "  - ECS IAM Roles (task execution + task)"
          echo ""
          echo "Resources that were RE-CREATED:"
          echo "  - ECS Cluster, Service, Task Definition"
          echo "  - CloudWatch Log Group (ECS tasks)"
          echo "  - Application Load Balancer + Listeners + Target Groups"
          echo "  - Route53 record for API subdomain"
          echo "  - ALB Security Group"
          echo "  - ECS Tasks Security Group + SG rules"
          echo "  - DynamoDB cache table"
          echo "  - Auto Scaling target + policy"
          echo "  - EC2 bastion instance"
          echo "  - Lambda scheduler + EventBridge rules"
          echo "  - ALB logs S3 bucket"
          echo "================================"
