name: Provision Terraform Backend (S3 + DynamoDB)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region to deploy backend resources"
        required: true
        default: "ca-central-1"
      bucket_name:
        description: "Explicit S3 bucket name (must be lowercase, globally unique)"
        required: true
      table_name:
        description: "DynamoDB table name (must be provided)"
        required: true
      # removed: sse_algorithm and kms_key_id (not used by terraform/state-init)

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Cache Terraform plugins
        uses: actions/cache@v5.0.1
        with:
          path: ${{ env.HOME }}/.terraform.d/plugin-cache
          key: terraform-plugin-cache-${{ runner.os }}-${{ inputs.aws_region }}
          restore-keys: |
            terraform-plugin-cache-${{ runner.os }}-

      - name: Ensure Terraform plugin cache dir
        run: |
          mkdir -p "$HOME/.terraform.d/plugin-cache"
        shell: bash

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_wrapper: false

      - name: Terraform Fmt (check)
        working-directory: terraform/state-init
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache
        run: |
          terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform/state-init
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache
        run: |
          terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform/state-init
        env:
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache
        run: |
          terraform validate -no-color

      - name: Pre-check backend resources
        working-directory: terraform/state-init
        env:
          AWS_REGION: ${{ inputs.aws_region }}
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.bucket_name }}" ] || [ -z "${{ inputs.table_name }}" ]; then
            echo "Error: 'bucket_name' and 'table_name' must be provided to run this workflow safely." >&2
            exit 1
          fi
          BUCKET='${{ inputs.bucket_name }}'
          TABLE='${{ inputs.table_name }}'
          echo "Checking S3 bucket '${BUCKET}'..."
          if aws s3api head-bucket --bucket "${BUCKET}" >/dev/null 2>&1; then
            echo "Pre-existing S3 bucket detected: ${BUCKET}. Aborting to avoid accidental reuse/collision." >&2
            exit 1
          fi
          echo "Checking DynamoDB table '${TABLE}'..."
          if aws dynamodb describe-table --table-name "${TABLE}" >/dev/null 2>&1; then
            echo "Pre-existing DynamoDB table detected: ${TABLE}. Aborting to avoid accidental reuse/collision." >&2
            exit 1
          fi
          echo "No pre-existing backend resources detected. Continuing."

      - name: Terraform Plan
        working-directory: terraform/state-init
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache
        run: |
          TF_VAR_aws_region='${{ inputs.aws_region }}' \
          TF_VAR_bucket_name='${{ inputs.bucket_name }}' \
          TF_VAR_table_name='${{ inputs.table_name }}' \
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply (one-time provisioning)
        working-directory: terraform/state-init
        env:
          AWS_REGION: ${{ inputs.aws_region }}
          TF_PLUGIN_CACHE_DIR: $HOME/.terraform.d/plugin-cache
        run: |
          terraform apply -auto-approve -input=false tfplan

      - name: Show outputs
        working-directory: terraform/state-init
        run: |
          terraform output -json
