name: "Onetime Provision: AWS CI Role + GitHub Secrets & Variables"

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      # Environment is inferred from terraform/bootstrap_orchestration/bootstrap_environments.tfvars
      aws_account_id:
        description: 'AWS account id to provision the CI role in (override: target a different AWS account; if omitted, inferred from AWS credentials)'
        required: false
      github_owner:
        description: 'GitHub org/user that owns the repo (override: target a different owner; if omitted, uses this repository owner)'
        required: false
      repository:
        description: 'Repository name to provision (e.g., portfolio) (override: target a different repository; if omitted, uses this repository name)'
        required: false
      # Optional: if you already have a role to assume via OIDC, provide its ARN here.
      role_arn:
        description: 'Optional ARN of an existing IAM role to assume via OIDC (fallback: workflow will use `AWS_ACCESS_KEY_ID`/`AWS_SECRET_ACCESS_KEY` repo secrets if omitted)'
        required: false
      aws_region:
        description: 'AWS region to use (overrides secret AWS_REGION)'
        required: false
      provision_github_token_note:
        description: 'NOTE: create repo secret PROVISION_GITHUB_TOKEN under Settings → Secrets and variables → Actions → New repository secret before running. The GitHub token must have repo/admin rights to create repo secrets and variables. Also the OIDC assume role (if used) must have permissions to create IAM roles and policies and the trust relationship with GitHub Actions must be configured correctly.'
        required: false
        default: 'N/A - note only'
      tf_state_bucket:
        description: 'Optional TF state bucket name (override: sets tf_state_bucket var). If omitted, module may compute a default.'
        required: false
        default: 'healthdots-portfolio-terraform-state'
      tf_state_dynamodb_table:
        description: 'Optional TF state dynamodb table name (override: sets tf_state_dynamodb_table var).'
        required: false
        default: 'healthdots-portfolio-terraform-locks'
      target_ci_role_first:
        description: 'Optional: set to "true" to run a targeted apply for module.ci_role first and wait for propagation before the full apply.'
        required: false
        default: 'true'

jobs:
  provision:
    name: Onetime provision (Terraform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/bootstrap_orchestration
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set GitHub defaults (owner/repo) when inputs omitted
        env:
          INPUT_GITHUB_OWNER: ${{ github.event.inputs.github_owner }}
          INPUT_REPOSITORY: ${{ github.event.inputs.repository }}
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          REPO_OWNER=${GITHUB_REPOSITORY%%/*}
          if [ -n "$INPUT_GITHUB_OWNER" ]; then
            echo "TF_VAR_github_owner=$INPUT_GITHUB_OWNER" >> $GITHUB_ENV
          else
            echo "TF_VAR_github_owner=$REPO_OWNER" >> $GITHUB_ENV
          fi
          if [ -n "$INPUT_REPOSITORY" ]; then
            echo "TF_VAR_repository=$INPUT_REPOSITORY" >> $GITHUB_ENV
          else
            echo "TF_VAR_repository=$REPO_NAME" >> $GITHUB_ENV
          fi

      - name: Set TF_VAR_aws_account_id from input when provided
        if: ${{ github.event.inputs.aws_account_id != '' }}
        run: |
          echo "TF_VAR_aws_account_id=${{ github.event.inputs.aws_account_id }}" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC role assumption)
        if: ${{ github.event.inputs.role_arn != '' }}
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ github.event.inputs.role_arn }}
          aws-region: ${{ github.event.inputs.aws_region || secrets.AWS_REGION || 'ca-central-1' }}
          audience: sts.amazonaws.com

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ github.event.inputs.role_arn == '' }}
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.aws_region || secrets.AWS_REGION || 'ca-central-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.7'

      - name: Detect existing OIDC provider ARN for token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          echo "Locating OIDC provider for token.actions.githubusercontent.com..."
          PROVIDERS=$(aws iam list-open-id-connect-providers --query 'OpenIDConnectProviderList[].Arn' --output text || true)
          OIDC_ARN=""
          for arn in $PROVIDERS; do
            URL=$(aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$arn" --query 'Url' --output text 2>/dev/null || true)
            if [ -n "$URL" ] && echo "$URL" | grep -qi "token.actions.githubusercontent.com"; then
              OIDC_ARN=$arn
              break
            fi
          done
          if [ -z "$OIDC_ARN" ]; then
            echo "ERROR: No OIDC provider for token.actions.githubusercontent.com found in AWS account." >&2
            echo "If you created the provider manually, ensure the credentials used by this workflow can access it." >&2
            exit 1
          fi
          echo "Found OIDC provider ARN: $OIDC_ARN"
          echo "TF_VAR_existing_oidc_provider_arn=$OIDC_ARN" >> $GITHUB_ENV
     
      - name: Provide GitHub token to Terraform (use PROVISION_GITHUB_TOKEN or fallback to GITHUB_TOKEN)
        if: always()
        env:
          PROVISION_GITHUB_TOKEN: ${{ secrets.PROVISION_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$PROVISION_GITHUB_TOKEN" ]; then
            echo "Using PROVISION_GITHUB_TOKEN (repository secret) for Terraform GitHub provider" >&2
            echo "TF_VAR_github_token=$PROVISION_GITHUB_TOKEN" >> $GITHUB_ENV
          else
            echo "PROVISION_GITHUB_TOKEN not set; falling back to GITHUB_TOKEN" >&2
            echo "TF_VAR_github_token=$GITHUB_TOKEN" >> $GITHUB_ENV
          fi

      - name: Detect AWS account id (if not provided)
        if: ${{ github.event.inputs.aws_account_id == '' }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_VAR_aws_account_id=$AWS_ACCOUNT_ID" >> $GITHUB_ENV

      - name: Export TF state bucket/table from inputs when provided
        run: |
          if [ -n "${{ github.event.inputs.tf_state_bucket }}" ]; then
            echo "TF_VAR_tf_state_bucket=${{ github.event.inputs.tf_state_bucket }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ github.event.inputs.tf_state_dynamodb_table }}" ]; then
            echo "TF_VAR_tf_state_dynamodb_table=${{ github.event.inputs.tf_state_dynamodb_table }}" >> $GITHUB_ENV
          fi

      - name: Init Terraform
        run: |
          terraform init -reconfigure

      - name: Targeted apply for module.ci_role (optional)
        if: ${{ github.event.inputs.target_ci_role_first == 'true' }}
        run: |
          echo "Running targeted apply for module.ci_role..."
          terraform apply -target="module.ci_role" -var-file="bootstrap_environments.tfvars" -auto-approve

      - name: Capture CI role ARN and wait for propagation (optional)
        if: ${{ github.event.inputs.target_ci_role_first == 'true' }}
        run: |
          ROLE_ARN=$(terraform output -raw role_arn 2>/dev/null || true)
          if [ -z "$ROLE_ARN" ]; then
            echo "ERROR: module.ci_role did not export role_arn" >&2
            exit 1
          fi
          echo "Captured role ARN: $ROLE_ARN"
          echo "TF_VAR_aws_role_arn=$ROLE_ARN" >> $GITHUB_ENV
          ROLE_NAME=${ROLE_ARN##*/}
          for i in $(seq 1 12); do
            if aws iam get-role --role-name "$ROLE_NAME" >/dev/null 2>&1; then
              echo "IAM role exists"
              break
            fi
            echo "Waiting for IAM role propagation ($i/12)..."
            sleep 5
          done
          # Test assume-role to ensure the role is usable; fail early if not
          if aws sts assume-role --role-arn "$ROLE_ARN" --role-session-name ci-probe >/dev/null 2>&1; then
            echo "Assume-role succeeded for $ROLE_ARN"
          else
            echo "ERROR: assume-role for $ROLE_ARN failed; aborting workflow" >&2
            exit 1
          fi

      - name: Configure AWS credentials to assume created role (optional)
        if: ${{ github.event.inputs.target_ci_role_first == 'true' }}
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ env.TF_VAR_aws_role_arn }}
          aws-region: ${{ github.event.inputs.aws_region || secrets.AWS_REGION || 'ca-central-1' }}
          audience: sts.amazonaws.com

      

      - name: Apply bootstrap Terraform (creates CI role and GitHub repo secrets/vars)
        run: |
          # Run plan first so operator can inspect outputs in run logs if needed
          terraform plan -var-file="bootstrap_environments.tfvars" -out=bootstrap-plan
          terraform apply -var-file="bootstrap_environments.tfvars" -auto-approve bootstrap-plan

      - name: Show important outputs
        run: |
          terraform output || true

    # IMPORTANT: this workflow expects the following repository secrets to be set before running:
    # - PROVISION_GITHUB_TOKEN : a personal access token with repo/admin rights used to create repo secrets/variables
    # - If not using OIDC: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION : AWS creds able to create IAM resources in target account
