name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ca-central-1
          audience: sts.amazonaws.com

      - name: Sync build to S3
        run: |
          aws s3 sync ./dist s3://healthdots-portfolio-web-app-001 \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" && \
          aws s3 cp ./dist/index.html s3://healthdots-portfolio-web-app-001/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Post-deploy output
        run: |
          echo "Deployed to S3: s3://healthdots-portfolio-web-app-001";
          echo "CloudFront URL: https://dc274vt0tzx97.cloudfront.net"